<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Todo App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .todo-container{
      background:white;
      padding:25px;
      width:350px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-section{
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      outline:none;
    }

    button{
      padding:10px 15px;
      border:none;
      background:#007bff;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    ul{
      list-style:none;
      margin-top:20px;
    }

    li{
      background:#f1f1f1;
      padding:10px;
      margin-bottom:10px;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete-btn{
      background:red;
      padding:5px 10px;
      font-size:12px;
    }

    .delete-btn:hover{
      background:darkred;
    }
  </style>
</head>
<body>

  <div class="todo-container">
    <h1>Todo App</h1>

    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Enter task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="todoList"></ul>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById("todoInput");
      let task = input.value.trim();

      if(task === ""){
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");
      li.innerHTML = `
        ${task}
        <button class="delete-btn" onclick="removeTask(this)">Delete</button>
      `;

      document.getElementById("todoList").appendChild(li);

      input.value = "";
    }

    function removeTask(button) {
      button.parentElement.remove();
    }
  </script>

</body>
</html>
